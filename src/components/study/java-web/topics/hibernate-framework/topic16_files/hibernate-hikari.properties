# Hibernate configuration with HikariCP (modern, recommended)
hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
hibernate.connection.driver_class=org.postgresql.Driver
hibernate.connection.url=jdbc:postgresql://localhost:5432/school_db
hibernate.connection.username=swadeep
hibernate.connection.password=secure123

# HikariCP specific properties (prefix with hibernate.hikari.)
hibernate.hikari.maximumPoolSize=10
hibernate.hikari.minimumIdle=5
hibernate.hikari.idleTimeout=300000
hibernate.hikari.connectionTimeout=30000
hibernate.hikari.leakDetectionThreshold=10000 # 10 seconds
hibernate.hikari.connectionTestQuery=SELECT 1
hibernate.hikari.poolName=SchoolHikariPool
hibernate.hikari.registerMbeans=true

# Optional: Hibernate also uses these for compatibility
hibernate.connection.provider_class=com.zaxxer.hikari.hibernate.HikariConnectionProvider