# Hibernate configuration with c3p0 connection pool
hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
hibernate.connection.driver_class=org.postgresql.Driver
hibernate.connection.url=jdbc:postgresql://localhost:5432/school_db
hibernate.connection.username=swadeep
hibernate.connection.password=secure123

# Enable c3p0
hibernate.c3p0.min_size=5
hibernate.c3p0.max_size=20
hibernate.c3p0.timeout=300          # seconds idle before eviction
hibernate.c3p0.max_statements=50    # statement cache size
hibernate.c3p0.idle_test_period=3000 # seconds between connection tests
hibernate.c3p0.acquire_increment=3   # number of connections to get when pool exhausted
hibernate.c3p0.unreturnedConnectionTimeout=30 # detect leaked connections (seconds)