# Hibernate configuration for DDL generation examples
hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
hibernate.connection.driver_class=org.postgresql.Driver
hibernate.connection.url=jdbc:postgresql://localhost:5432/school_db
hibernate.connection.username=swadeep
hibernate.connection.password=secure123

# DDL options - demo different values
hibernate.hbm2ddl.auto=update          # update schema (dev only)
# hibernate.hbm2ddl.auto=create        # drop & recreate
# hibernate.hbm2ddl.auto=validate      # check without changes
# hibernate.hbm2ddl.auto=create-drop   # drop on SessionFactory close

# Generate SQL scripts to file (instead of executing)
hibernate.hbm2ddl.import_files=import.sql
hibernate.hbm2ddl.import_files_sql_extractor=org.hibernate.tool.hbm2ddl.MultipleLinesSqlScriptExtractor