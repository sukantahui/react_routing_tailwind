    </div>
    <script>
        // Project: For Loop – Sum and Multiplication Tables
        // Write your code here
        
// Sum 1..100
let sum = 0;
for (let i = 1; i <= 100; i++) {
    sum += i;
}
console.log('Sum 1-100:', sum);
// Multiplication table for 5
console.log('5 times table:');
for (let i = 1; i <= 10; i++) {
    console.log(`5 x ${i} = ${5 * i}`);
}

    </script>
