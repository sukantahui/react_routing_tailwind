    <script>
        // Project: Dom Project: live character count
        
        // HTML will be generated; the following JS manipulates the DOM
        const app = document.getElementById('app');
        <textarea id='textArea' rows='4' cols='50'></textarea><p>Characters: <span id='charCount'>0</span></p>
        const area = document.getElementById('textArea');
const countSpan = document.getElementById('charCount');
area.addEventListener('input', () => { countSpan.textContent = area.value.length; });
